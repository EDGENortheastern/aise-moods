name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --run

      - name: Build
        run: npm run build

  backend:
    name: Backend (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The backend is added later. Until backend/Cargo.toml exists,
      # this job is a no-op so CI stays green.
      - name: Check if backend exists
        id: check
        run: |
          if [ -f backend/Cargo.toml ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "backend/ not set up yet — skipping Rust checks."
          fi

      - uses: dtolnay/rust-toolchain@stable
        if: steps.check.outputs.exists == 'true'

      - name: Build and test
        if: steps.check.outputs.exists == 'true'
        working-directory: backend
        run: |
          cargo build --verbose
          cargo test --verbose
